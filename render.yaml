services:
  - type: web
    name: project-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AI_API_BASE
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
    plan: free
