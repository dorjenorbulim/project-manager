<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
        .nav { background: #1d1d1f; padding: 0 24px; display: flex; align-items: center; height: 52px; }
        .nav a { color: #f5f5f7; text-decoration: none; padding: 14px 16px; font-size: 14px; font-weight: 500; transition: opacity .2s; }
        .nav a:hover { opacity: .7; }
        .nav .brand { font-weight: 700; font-size: 16px; margin-right: 24px; }
        .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
        .flash { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px; font-size: 14px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 20px; }
        h2 { font-size: 22px; font-weight: 600; margin: 24px 0 12px; }
        h3 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; }
        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .card-header { font-size: 14px; color: #86868b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: 700; }
        .card-sub { font-size: 13px; color: #86868b; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #86868b; border-bottom: 2px solid #f0f0f0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:hover { background: #fafafa; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-todo { background: #f0f0f0; color: #555; }
        .badge-in_progress { background: #e3f2fd; color: #1565c0; }
        .badge-done { background: #e8f5e9; color: #2e7d32; }
        .badge-upcoming { background: #f0f0f0; color: #555; }
        .badge-overdue { background: #ffebee; color: #c62828; }
        .badge-high { background: #ffebee; color: #c62828; }
        .badge-medium { background: #fff3e0; color: #e65100; }
        .badge-low { background: #e8f5e9; color: #2e7d32; }
        .progress-bar { background: #f0f0f0; border-radius: 8px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 8px; background: #007aff; transition: width .3s; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background .2s; }
        .btn-primary { background: #007aff; color: #fff; }
        .btn-primary:hover { background: #0056cc; }
        .btn-danger { background: #ff3b30; color: #fff; font-size: 12px; padding: 4px 10px; }
        .btn-danger:hover { background: #cc2f26; }
        .btn-sm { font-size: 12px; padding: 4px 10px; }
        form.inline { display: inline; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #555; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .add-form { background: #fafafa; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .add-form h3 { margin-top: 0; }
        .actions { display: flex; gap: 6px; align-items: center; }
        .overdue { color: #c62828; font-weight: 600; }
        .budget-bar { height: 20px; background: #f0f0f0; border-radius: 4px; overflow: hidden; position: relative; }
        .budget-spent { height: 100%; background: #007aff; border-radius: 4px; }
        .budget-over .budget-spent { background: #ff3b30; }
        .timeline-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-done { background: #4caf50; }
        .dot-in_progress { background: #2196f3; }
        .dot-upcoming { background: #bdbdbd; }
        .dot-overdue { background: #f44336; }
        /* Gantt Chart */
        .gantt-chart { font-size: 13px; }
        .gantt-header { display: flex; border-bottom: 2px solid #d2d2d7; padding-bottom: 6px; margin-bottom: 4px; }
        .gantt-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .gantt-row:hover { background: #fafafa; }
        .gantt-label-col { width: 160px; min-width: 160px; padding: 8px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .gantt-timeline { flex: 1; position: relative; }
        .gantt-month { text-align: center; font-size: 11px; color: #86868b; text-transform: uppercase; letter-spacing: .5px; padding: 4px 0; }
        .gantt-bar-container { position: relative; height: 28px; }
        .gantt-bar { position: absolute; top: 2px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 600; cursor: pointer; transition: opacity .2s; min-width: 8px; }
        .gantt-bar:hover { opacity: .85; }
        .gantt-bar-upcoming { background: #bdbdbd; }
        .gantt-bar-in_progress { background: #2196f3; }
        .gantt-bar-done { background: #4caf50; }
        .gantt-bar-overdue { background: #f44336; }
        .gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff9800; z-index: 2; }
        /* Chatbot */
        /* Charter & stakeholder styles */
        .charter-section { margin-bottom: 28px; }
        .charter-section h3 { border-bottom: 2px solid #f0f0f0; padding-bottom: 6px; margin-bottom: 12px; }
        .chip { display: inline-block; background: #f0f0f5; border-radius: 8px; padding: 6px 12px; margin: 4px 6px 4px 0; font-size: 14px; }
        .chip-out { background: #ffebee; color: #c62828; }
        .chip-risk { background: #fff3e0; color: #e65100; }
        .stakeholder-cat { border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .stakeholder-cat h4 { margin: 0 0 4px 0; font-size: 15px; }
        .stakeholder-cat .cat-hint { font-size: 12px; color: #86868b; margin-bottom: 12px; }
        .cat-manage_closely { background: #e3f2fd; border-left: 4px solid #1565c0; }
        .cat-keep_satisfied { background: #fff8e1; border-left: 4px solid #ff8f00; }
        .cat-keep_informed { background: #e8f5e9; border-left: 4px solid #2e7d32; }
        .cat-monitor { background: #f5f5f5; border-left: 4px solid #9e9e9e; }
        /* Power/Interest grid */
        .pi-grid { display: grid; grid-template-columns: 80px 1fr 1fr; grid-template-rows: 40px 1fr 1fr; gap: 2px; max-width: 480px; margin: 16px 0; font-size: 12px; }
        .pi-axis { background: #fafafa; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #86868b; text-align: center; padding: 4px; }
        .pi-cell { border: 1px dashed #d2d2d7; border-radius: 8px; padding: 8px; min-height: 100px; }
        .pi-cell .pi-label { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .pi-cell .pi-name { background: #fff; border-radius: 6px; padding: 3px 8px; margin: 3px 0; font-size: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
        /* Proposal comparison */
        .score-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 4px; }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 700; font-size: 14px; }
        .rank-1 { background: #4caf50; color: #fff; }
        .rank-2 { background: #2196f3; color: #fff; }
        .rank-3 { background: #ff9800; color: #fff; }
        .rank-other { background: #e0e0e0; color: #555; }
        .winner { border: 2px solid #4caf50; box-shadow: 0 2px 8px rgba(76,175,80,.2); }
        .score-cell { text-align: center; }
        .score-num { font-weight: 700; font-size: 16px; }
        /* Quick-Add Assistant */
        .qa-toggle { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #007aff; color: #fff; border: none; cursor: pointer; font-size: 24px; box-shadow: 0 4px 12px rgba(0,122,255,.4); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: transform .2s; }
        .qa-toggle:hover { transform: scale(1.1); }
        .qa-window { position: fixed; bottom: 92px; right: 24px; width: 380px; max-height: 560px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.15); display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        .qa-window.open { display: flex; }
        .qa-header { background: #1d1d1f; color: #fff; padding: 14px 18px; font-weight: 600; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
        .qa-header button { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; opacity: .7; }
        .qa-header button:hover { opacity: 1; }
        .qa-tabs { display: flex; border-bottom: 1px solid #e5e5ea; overflow-x: auto; }
        .qa-tab { padding: 10px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: #86868b; white-space: nowrap; border-bottom: 2px solid transparent; transition: all .2s; }
        .qa-tab:hover { color: #1d1d1f; }
        .qa-tab.active { color: #007aff; border-bottom-color: #007aff; }
        .qa-body { flex: 1; overflow-y: auto; padding: 16px; }
        .qa-panel { display: none; }
        .qa-panel.active { display: block; }
        .qa-panel .form-group { margin-bottom: 10px; }
        .qa-panel .form-group label { font-size: 12px; font-weight: 500; margin-bottom: 3px; color: #555; }
        .qa-panel .form-group input, .qa-panel .form-group select, .qa-panel .form-group textarea { width: 100%; padding: 7px 10px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 13px; }
        .qa-panel .form-group textarea { resize: vertical; min-height: 40px; }
        .qa-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #007aff; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
        .qa-btn:hover { background: #0056cc; }
        .qa-btn:disabled { background: #c0c0c0; cursor: not-allowed; }
        .qa-log { margin-top: 12px; max-height: 120px; overflow-y: auto; }
        .qa-log-item { font-size: 12px; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; background: #e8f5e9; color: #2e7d32; }
        .qa-log-item.error { background: #ffebee; color: #c62828; }
        .qa-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .qa-count { font-size: 11px; color: #86868b; margin-left: 4px; }
    </style>
</head>
<body {% block body_attrs %}{% endblock %}>
    <nav class="nav">
        <a href="/" class="brand">PM</a>
        <a href="/">Dashboard</a>
        <a href="/proposals">Selection</a>
        <a href="/charters">Charters</a>
        <a href="/schedule">Schedule</a>
        <a href="/tasks">Tasks</a>
        <a href="/budget">Budget</a>
        <a href="/members">Members</a>
        <a href="/contributions">Contributions</a>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}

    <!-- Quick-Add Assistant -->
    <button class="qa-toggle" id="qaToggle" title="Quick Add">&#43;</button>
    <div class="qa-window" id="qaWindow">
        <div class="qa-header">
            <span>Quick Add</span>
            <button id="qaClose">&times;</button>
        </div>
        <div class="qa-tabs">
            <button class="qa-tab active" data-tab="members">Members</button>
            <button class="qa-tab" data-tab="milestones">Milestones</button>
            <button class="qa-tab" data-tab="tasks">Tasks</button>
            <button class="qa-tab" data-tab="budget">Budget</button>
            <button class="qa-tab" data-tab="expenses">Expenses</button>
        </div>
        <div class="qa-body">
            <!-- Members panel -->
            <div class="qa-panel active" data-panel="members">
                <form id="qaFormMembers" onsubmit="return false;">
                    <div class="form-group"><label>Name *</label><input type="text" name="name" placeholder="e.g. Alice Wong" required></div>
                    <div class="qa-grid-2">
                        <div class="form-group"><label>Role</label><input type="text" name="role" placeholder="e.g. Developer"></div>
                        <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="optional"></div>
                    </div>
                    <button type="submit" class="qa-btn">Add member</button>
                </form>
            </div>
            <!-- Milestones panel -->
            <div class="qa-panel" data-panel="milestones">
                <form id="qaFormMilestones" onsubmit="return false;">
                    <div class="form-group"><label>Name *</label><input type="text" name="name" placeholder="e.g. Sprint 1" required></div>
                    <div class="form-group"><label>Description</label><input type="text" name="description" placeholder="optional"></div>
                    <div class="qa-grid-2">
                        <div class="form-group"><label>Start date</label><input type="date" name="start_date"></div>
                        <div class="form-group"><label>Deadline *</label><input type="date" name="deadline" required></div>
                    </div>
                    <button type="submit" class="qa-btn">Add milestone</button>
                </form>
            </div>
            <!-- Tasks panel -->
            <div class="qa-panel" data-panel="tasks">
                <form id="qaFormTasks" onsubmit="return false;">
                    <div class="form-group"><label>Title *</label><input type="text" name="title" placeholder="e.g. Build API" required></div>
                    <div class="qa-grid-2">
                        <div class="form-group">
                            <label>Priority</label>
                            <select name="priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select>
                        </div>
                        <div class="form-group"><label>Due date</label><input type="date" name="due_date"></div>
                    </div>
                    <div class="form-group">
                        <label>Milestone</label>
                        <select name="milestone_id" id="qaTaskMilestone"><option value="">None</option></select>
                    </div>
                    <div class="form-group">
                        <label>Assignee</label>
                        <select name="assignee_id" id="qaTaskAssignee"><option value="">Unassigned</option></select>
                    </div>
                    <button type="submit" class="qa-btn">Add task</button>
                </form>
            </div>
            <!-- Budget categories panel -->
            <div class="qa-panel" data-panel="budget">
                <form id="qaFormBudget" onsubmit="return false;">
                    <div class="form-group"><label>Category name *</label><input type="text" name="name" placeholder="e.g. Software" required></div>
                    <div class="form-group"><label>Allocated ($)</label><input type="number" name="allocated" step="0.01" min="0" placeholder="0.00"></div>
                    <button type="submit" class="qa-btn">Add category</button>
                </form>
            </div>
            <!-- Expenses panel -->
            <div class="qa-panel" data-panel="expenses">
                <form id="qaFormExpenses" onsubmit="return false;">
                    <div class="form-group"><label>Description *</label><input type="text" name="description" placeholder="e.g. AWS hosting" required></div>
                    <div class="qa-grid-2">
                        <div class="form-group"><label>Amount ($) *</label><input type="number" name="amount" step="0.01" min="0.01" placeholder="0.00" required></div>
                        <div class="form-group"><label>Date</label><input type="date" name="date"></div>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category_id" id="qaExpenseCategory" required></select>
                    </div>
                    <div class="form-group"><label>Paid by</label><input type="text" name="paid_by" placeholder="optional"></div>
                    <button type="submit" class="qa-btn">Add expense</button>
                </form>
            </div>
            <!-- Activity log -->
            <div class="qa-log" id="qaLog"></div>
        </div>
    </div>

    <script>
    (function() {
        const toggle = document.getElementById('qaToggle');
        const win = document.getElementById('qaWindow');
        const close = document.getElementById('qaClose');
        const tabs = document.querySelectorAll('.qa-tab');
        const panels = document.querySelectorAll('.qa-panel');
        const log = document.getElementById('qaLog');
        let optionsCache = null;

        toggle.addEventListener('click', () => {
            win.classList.toggle('open');
            if (win.classList.contains('open')) loadOptions();
        });
        close.addEventListener('click', () => win.classList.remove('open'));

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.querySelector('[data-panel="' + tab.dataset.tab + '"]').classList.add('active');
            });
        });

        function addLog(msg, isError) {
            const div = document.createElement('div');
            div.className = 'qa-log-item' + (isError ? ' error' : '');
            div.textContent = msg;
            log.insertBefore(div, log.firstChild);
            while (log.children.length > 8) log.removeChild(log.lastChild);
        }

        async function loadOptions() {
            try {
                const res = await fetch('/api/quick/options');
                optionsCache = await res.json();
                populateDropdowns();
            } catch (e) { /* silent */ }
        }

        function populateDropdowns() {
            if (!optionsCache) return;
            const ms = document.getElementById('qaTaskMilestone');
            const as = document.getElementById('qaTaskAssignee');
            const cat = document.getElementById('qaExpenseCategory');
            if (ms) {
                ms.innerHTML = '<option value="">None</option>' + optionsCache.milestones.map(m => '<option value="' + m.id + '">' + m.name + '</option>').join('');
            }
            if (as) {
                as.innerHTML = '<option value="">Unassigned</option>' + optionsCache.members.map(m => '<option value="' + m.id + '">' + m.name + (m.role ? ' (' + m.role + ')' : '') + '</option>').join('');
            }
            if (cat) {
                const cur = cat.value;
                cat.innerHTML = '<option value="">Select...</option>' + optionsCache.categories.map(c => '<option value="' + c.id + '">' + c.name + ' ($' + c.allocated.toFixed(2) + ')</option>').join('');
                if (cur) cat.value = cur;
            }
        }

        async function submitForm(url, formData) {
            const data = {};
            formData.forEach((v, k) => { if (v) data[k] = v; });
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                addLog(result.message, !result.success);
                if (result.success) {
                    await loadOptions();  // refresh dropdowns
                }
                return result;
            } catch (e) {
                addLog('Network error - please try again.', true);
                return { success: false };
            }
        }

        // Wire up each form
        document.getElementById('qaFormMembers').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = await submitForm('/api/quick/members', new FormData(form));
            if (result.success) { form.querySelector('[name="name"]').value = ''; form.querySelector('[name="role"]').value = ''; form.querySelector('[name="email"]').value = ''; form.querySelector('[name="name"]').focus(); }
        });

        document.getElementById('qaFormMilestones').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = await submitForm('/api/quick/milestones', new FormData(form));
            if (result.success) { form.querySelector('[name="name"]').value = ''; form.querySelector('[name="description"]').value = ''; form.querySelector('[name="start_date"]').value = ''; form.querySelector('[name="name"]').focus(); }
        });

        document.getElementById('qaFormTasks').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = await submitForm('/api/quick/tasks', new FormData(form));
            if (result.success) { form.querySelector('[name="title"]').value = ''; form.querySelector('[name="due_date"]').value = ''; form.querySelector('[name="title"]').focus(); }
        });

        document.getElementById('qaFormBudget').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = await submitForm('/api/quick/categories', new FormData(form));
            if (result.success) { form.querySelector('[name="name"]').value = ''; form.querySelector('[name="allocated"]').value = ''; form.querySelector('[name="name"]').focus(); }
        });

        document.getElementById('qaFormExpenses').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = await submitForm('/api/quick/expenses', new FormData(form));
            if (result.success) { form.querySelector('[name="description"]').value = ''; form.querySelector('[name="amount"]').value = ''; form.querySelector('[name="paid_by"]').value = ''; form.querySelector('[name="description"]').focus(); }
        });
    })();
    </script>
</body>
</html>
